<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可靠度管理部可靠度與失效分析實驗室設備管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+TC:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F7F4; --surface: #FFFFFF; --surface2: #F2F0EB;
  --border: #E4E0D8; --border2: #D0CBBf;
  --text: #1A1916; --text2: #6B6760; --text3: #9B978F;
  --blue: #1A5EB8; --blue-light: #E8F0FB; --blue-mid: #4A85D4;
  --teal: #0D7A5F; --teal-light: #E2F4EE;
  --amber: #9C5D0A; --amber-light: #FDF0DC;
  --red: #B42B2B; --red-light: #FDEAEA;
  --green: #2A7A3B; --green-light: #E8F5EC;
  --gray-light: #F2F0EB; --gray-mid: #8A867E;
  --dark-bg: #0F1117; --dark-surface: #181C27; --dark-border: rgba(255,255,255,0.07);
  --neon-blue: #3D6FFF; --neon-teal: #0ECFAF; --neon-amber: #F5A623; --neon-red: #FF4D6D; --neon-green: #22C97A;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
  --font: 'IBM Plex Sans TC', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 14px; line-height: 1.5; }

/* TOPBAR */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--blue); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.topbar-badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: var(--blue-light); color: var(--blue); font-weight: 500; border: 1px solid rgba(26,94,184,0.15); }

/* LAYOUT */
.app-body { display: flex; flex: 1; }

/* SIDEBAR */
.sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 0.875rem; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-section { margin-bottom: 1.5rem; }
.sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 0.5rem; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); width: 100%; text-align: left; transition: all 0.15s; margin-bottom: 2px; font-family: var(--font); }
.nav-item i { font-size: 17px; width: 20px; text-align: center; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--blue-light); color: var(--blue); }
.nav-stat { display: flex; justify-content: space-between; padding: 4px 0.5rem; font-size: 12px; color: var(--text3); }
.nav-stat strong { font-weight: 600; }
.nav-stat strong.blue { color: var(--blue); }
.nav-stat strong.teal { color: var(--teal); }
.nav-stat strong.gray { color: var(--text3); }

/* MAIN */
.main { flex: 1; padding: 2rem; min-width: 0; overflow-x: hidden; }
.page-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
.page-hd-left h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.page-hd-left h1 i { color: var(--blue); font-size: 22px; }
.page-hd-left p { font-size: 12px; color: var(--text3); margin-top: 3px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text); transition: all 0.15s; white-space: nowrap; font-family: var(--font); }
.btn:hover { background: var(--surface2); }
.btn i { font-size: 15px; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #14489A; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { color: var(--red); }
.btn-danger:hover { background: var(--red-light); }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); border-color: var(--border); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; box-shadow: var(--shadow-sm); }
.card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 7px; text-transform: uppercase; letter-spacing: 0.04em; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; line-height: 1.5; }
.badge-elec { background: var(--blue-light); color: var(--blue); }
.badge-mat { background: var(--teal-light); color: var(--teal); }
.badge-na { background: var(--gray-light); color: var(--gray-mid); }
.badge-ok { background: var(--green-light); color: var(--green); }
.badge-warn { background: var(--amber-light); color: var(--amber); }
.badge-due { background: var(--red-light); color: var(--red); }
.badge-none { background: var(--gray-light); color: var(--gray-mid); }

/* TABLE */
.collapsible-hd { display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none; }
.collapsible-hd:hover { opacity:0.8; }
.collapsible-body { overflow:hidden;transition:max-height 0.3s ease; }
.collapsible-body.collapsed { display:none; }
.chevron { font-size:14px;transition:transform 0.3s;color:var(--text3); }
.chevron.open { transform:rotate(180deg); }

.tbl-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); overflow-x: auto; }

/* Filter chips */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1.25rem; }
.filter-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: var(--radius-md); font-size: 12px; font-weight: 500; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: var(--font); position: relative; }
.filter-chip:hover { background: var(--surface2); color: var(--text); }
.filter-chip.active { background: var(--blue-light); color: var(--blue); border-color: rgba(26,94,184,0.3); }
.filter-chip i { font-size: 13px; }
.chip-clear { font-size: 11px; margin-left: 2px; opacity: 0.6; }
.chip-clear:hover { opacity: 1; }
.chip-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 60; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); min-width: 200px; padding: 6px; }
.chip-dropdown.open { display: block; }
.chip-dropdown input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 12px; background: var(--surface2); color: var(--text); margin-bottom: 6px; font-family: var(--font); }
.chip-dropdown input:focus { outline: none; border-color: var(--blue-mid); }
.chip-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; color: var(--text2); transition: background 0.1s; }
.chip-opt:hover { background: var(--surface2); color: var(--text); }
.chip-opt.sel { background: var(--blue-light); color: var(--blue); font-weight: 500; }
.chip-opt-check { font-size: 11px; width: 14px; flex-shrink: 0; }
.chip-foot { border-top: 1px solid var(--border); padding: 6px 4px 2px; margin-top: 4px; display: flex; gap: 4px; }
.chip-btn { flex: 1; padding: 5px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-family: var(--font); }
.chip-btn:hover { background: var(--surface2); }
.chip-btn.apply { background: var(--blue); color: #fff; border-color: var(--blue); }
.chip-btn.apply:hover { background: #14489A; }
/* Owner pill */
.owner-pill { display: inline-flex; align-items: center; font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; white-space: nowrap; }

table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }
.td-name { font-weight: 500; white-space: normal !important; line-height: 1.4; }
.td-mono { font-family: var(--mono); font-size: 11px; color: var(--text3); }

/* TOOLBAR */
.toolbar { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
.search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px; background: var(--surface); color: var(--text); font-family: var(--font); transition: border 0.15s; }
.search-wrap input:focus { outline: none; border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(26,94,184,0.1); }
select { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px; background: var(--surface); color: var(--text); cursor: pointer; font-family: var(--font); }

/* LIST ROWS */
.list-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
.list-row:last-child { border-bottom: none; }
.list-name { font-size: 13px; font-weight: 500; }
.list-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.alert-dot.due { background: var(--red); }
.alert-dot.warn { background: var(--amber); }
.alert-dot.ok { background: var(--green); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,15,12,0.45); z-index: 200; align-items: flex-start; justify-content: center; padding: 60px 1rem 2rem; overflow-y: auto; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border); padding: 2rem; width: 580px; max-width: 100%; position: relative; box-shadow: var(--shadow-lg); margin: auto; }
.modal-close { position: absolute; top: 1.25rem; right: 1.25rem; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 16px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.modal-close:hover { background: var(--border); }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.5rem; padding-right: 36px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1/-1; }
.fg label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.fg input, .fg select, .fg textarea { padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px; background: var(--surface); color: var(--text); width: 100%; font-family: var(--font); transition: border 0.15s; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(26,94,184,0.1); }
.fg textarea { resize: vertical; min-height: 80px; }
.modal-foot { margin-top: 1.5rem; display: flex; gap: 8px; justify-content: flex-end; padding-top: 1.25rem; border-top: 1px solid var(--border); }

/* DETAIL */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
.di-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.di-val { font-size: 13px; font-weight: 500; }

/* BUDGET */
.q-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1rem; }
.q-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.875rem; text-align: center; }
.q-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.q-val { font-size: 15px; font-weight: 600; }
.q-val.blue { color: var(--blue); }
.q-val.amber { color: var(--amber); }
.budget-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.budget-row:last-child { border-bottom: none; }
.budget-total { font-weight: 600; padding-top: 12px; margin-top: 4px; border-top: 1px solid var(--border2) !important; }
.two-mini { display: flex; gap: 10px; }
.two-mini > div { flex: 1; }
.stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 600; line-height: 1; }
.stat-val.blue { color: var(--blue); }
.stat-val.teal { color: var(--teal); }
.stat-val.amber { color: var(--amber); }
.stat-val.red { color: var(--red); }
.stat-val.green { color: var(--green); }

/* REPAIR */
.repair-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.125rem; margin-bottom: 10px; }

/* EMPTY */
.empty { text-align: center; padding: 3.5rem 1rem; color: var(--text3); }
.empty i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--border2); }
.empty p { font-size: 13px; }

/* ── DARK DASHBOARD ── */
.dark-dash { background: #0F1117; border-radius: var(--radius-xl); overflow: hidden; color: #E8E6F0; }
.dd-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
.dd-badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: rgba(61,111,255,0.15); color: #6B9FFF; border: 1px solid rgba(61,111,255,0.25); }
.dd-tabs { display: flex; gap: 4px; padding: 0.75rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
.dd-tab { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: #6B6980; display: flex; align-items: center; gap: 6px; transition: all 0.15s; font-family: var(--font); }
.dd-tab:hover { background: rgba(255,255,255,0.06); color: #C8C6D8; }
.dd-tab.active { background: rgba(61,111,255,0.2); color: #6B9FFF; border: 1px solid rgba(61,111,255,0.3); }
.dd-tab i { font-size: 14px; }
.dd-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.kpi { background: #181C27; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 1rem; position: relative; overflow: hidden; }
.kpi::before { content: ''; position: absolute; inset: 0; border-radius: 12px; opacity: 0.07; }
.kpi.k-blue::before { background: #3D6FFF; }
.kpi.k-teal::before { background: #0ECFAF; }
.kpi.k-amber::before { background: #F5A623; }
.kpi.k-red::before { background: #FF4D6D; }
.kpi.k-green::before { background: #22C97A; }
.kpi-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 8px; }
.kpi.k-blue .kpi-icon { background: rgba(61,111,255,0.2); color: #6B9FFF; }
.kpi.k-teal .kpi-icon { background: rgba(14,207,175,0.2); color: #0ECFAF; }
.kpi.k-amber .kpi-icon { background: rgba(245,166,35,0.2); color: #F5A623; }
.kpi.k-red .kpi-icon { background: rgba(255,77,109,0.2); color: #FF4D6D; }
.kpi.k-green .kpi-icon { background: rgba(34,201,122,0.2); color: #22C97A; }
.kpi-label { font-size: 10px; color: #6B6980; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.kpi-val { font-size: 22px; font-weight: 600; line-height: 1; }
.kpi.k-blue .kpi-val { color: #6B9FFF; }
.kpi.k-teal .kpi-val { color: #0ECFAF; }
.kpi.k-amber .kpi-val { color: #F5A623; }
.kpi.k-red .kpi-val { color: #FF4D6D; }
.kpi.k-green .kpi-val { color: #22C97A; }
.kpi-sub { font-size: 10px; color: #6B6980; margin-top: 4px; }

.dd-panel { background: #181C27; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 1rem 1.125rem; }
.dd-panel-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
.dd-panel-title { font-size: 10px; font-weight: 600; color: #8B8AA0; text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 7px; }
.dd-panel-title i { font-size: 14px; }

.dd-alert-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.dd-alert-item:last-child { border-bottom: none; }
.dd-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dd-dot.red { background: #FF4D6D; }
.dd-dot.amber { background: #F5A623; }
.dd-dot.green { background: #0ECFAF; }
.dd-name { font-size: 12px; font-weight: 500; color: #C8C6D8; flex: 1; }
.dd-sub { font-size: 10px; color: #6B6980; }

.dd-badge-r { display: inline-flex; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
.dd-badge-red { background: rgba(255,77,109,0.15); color: #FF7B93; border: 1px solid rgba(255,77,109,0.25); }
.dd-badge-amber { background: rgba(245,166,35,0.15); color: #F5C06A; border: 1px solid rgba(245,166,35,0.25); }
.dd-badge-green { background: rgba(14,207,175,0.15); color: #0ECFAF; border: 1px solid rgba(14,207,175,0.25); }
.dd-badge-blue { background: rgba(61,111,255,0.15); color: #6B9FFF; border: 1px solid rgba(61,111,255,0.25); }
.dd-badge-gray { background: rgba(255,255,255,0.07); color: #8B8AA0; border: 1px solid rgba(255,255,255,0.1); }

.dd-chart-wrap { position: relative; width: 100%; height: 140px; }

.owner-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.owner-item:last-child { border-bottom: none; }
.owner-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.owner-bar-wrap { width: 70px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.owner-bar { height: 100%; border-radius: 2px; }

.bbar-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.bbar-row:last-child { margin-bottom: 0; }
.bbar-hd { display: flex; justify-content: space-between; font-size: 11px; }
.bbar-name { color: #8B8AA0; }
.bbar-val { color: #C8C6D8; font-weight: 500; }
.bbar-track { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.bbar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* Progress */
.prog-section { margin-top: 0.75rem; }
.prog-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
.prog-track { height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

/* INPUT FORM dark */
.dd-input-section { display: flex; flex-direction: column; gap: 1rem; }
.sum-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.sum-box { background: #181C27; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 0.875rem; text-align: center; }
.sum-box-label { font-size: 10px; color: #6B6980; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.sum-box-val { font-size: 16px; font-weight: 600; }
.sum-box-val.blue { color: #6B9FFF; }
.sum-box-val.amber { color: #F5A623; }
.sum-box-val.green { color: #22C97A; }

.dd-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dfg { display: flex; flex-direction: column; gap: 5px; }
.dfg.full { grid-column: 1/-1; }
.dfg label { font-size: 10px; font-weight: 600; color: #6B6980; text-transform: uppercase; letter-spacing: 0.05em; }
.dfg select, .dfg input, .dfg textarea { padding: 8px 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 12px; background: #0F1117; color: #C8C6D8; font-family: var(--font); transition: border 0.15s; width: 100%; }
.dfg select:focus, .dfg input:focus, .dfg textarea:focus { outline: none; border-color: #3D6FFF; box-shadow: 0 0 0 3px rgba(61,111,255,0.15); }
.dfg textarea { resize: vertical; min-height: 68px; }
.dfg select option { background: #181C27; }
.dd-submit-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: 9px; background: #3D6FFF; color: #fff; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; width: 100%; font-family: var(--font); margin-top: 12px; }
.dd-submit-btn:hover { background: #2D5FEF; }

.dd-log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.dd-log-table th { padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 600; color: #6B6980; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.07); }
.dd-log-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #C8C6D8; vertical-align: middle; }
.dd-log-table tr:last-child td { border-bottom: none; }
.dd-log-table tr:hover td { background: rgba(255,255,255,0.03); }
.td-amt { font-family: var(--mono); color: #F5A623; font-weight: 500; }
.td-del-btn { background: none; border: none; cursor: pointer; color: #FF4D6D; padding: 3px 6px; border-radius: 6px; font-size: 13px; }
.td-del-btn:hover { background: rgba(255,77,109,0.15); }

.dd-empty { text-align: center; padding: 2rem; color: #4D4C60; font-size: 12px; }
.dd-empty i { font-size: 28px; display: block; margin-bottom: 6px; color: #2C2E3F; }

/* TOAST */
.toast { display: none; position: fixed; bottom: 2rem; right: 2rem; background: #22C97A; color: #0F1117; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; align-items: center; gap: 8px; z-index: 300; box-shadow: var(--shadow-lg); }
.toast.show { display: flex; animation: fadeout 2.5s forwards; }

/* SECTION GAP */
.section-gap { margin-bottom: 1.25rem; }

const API_URL = 'https://script.google.com/macros/s/AKfycbw6Ari8M_mYQNXNeFa7mhfVMvAoaoV6EhC-VP7WTY-hoVJbqx-vhuDg4RE35HoDhNFS/exec';

async function apiRead(sheet){
  try {
    const url = API_URL + '?sheet=' + encodeURIComponent(sheet) + '&action=read&t=' + Date.now();
    const res = await fetch(url, { method: 'GET', mode: 'cors' });
    const json = await res.json();
    return json.ok ? json.data : [];
  } catch(e) { console.error('Read error:', sheet, e); return []; }
}

async function apiWrite(sheet, data){
  try {
    // Use no-cors for cross-origin POST to Google Apps Script
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ sheet, action: 'write', data })
    });
    console.log('Saved to Sheets:', sheet, data.length, 'rows');
  } catch(e) {
    console.error('Write error:', e);
  }
}

  if(e.calExpiry){
    const diff=(new Date(e.calExpiry)-new Date())/86400000;

function renderTimeline(){
  const container = document.getElementById('dash-timeline');
  if(!container) return;
  const todayMonth = 5;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const events = [];
  EQ.filter(e=>e.calMethod!=='不需校驗'&&e.calScheduled).forEach(e=>{
    const d=new Date(e.calScheduled);
    const n=e.name.split(' ').slice(0,3).join(' ');
    events.push({month:d.getMonth(),day:d.getDate(),name:n,cost:e.calCost||e.calPlan||0,status:e.calStatus||'尚未校驗'});
  });
  const mIds=[14,15,16];
  EQ.filter(e=>mIds.includes(e.id)&&e.maintScheduled).forEach(e=>{
    const d=new Date(e.maintScheduled);
    const n=e.name.split(' ').slice(0,3).join(' ');
    events.push({month:d.getMonth(),day:d.getDate(),name:n,cost:e.maintCost||e.maintPlanCost||0,status:e.maintStatus||'尚未保養'});
  });
  chamberMaint.forEach(r=>{
    const d=new Date(r.maintScheduled);
    events.push({month:d.getMonth(),day:d.getDate(),name:'Chamber 環境試驗箱 '+r.quarter,cost:r.maintCost||r.maintPlanCost||0,status:r.maintStatus||'尚未保養'});
  });
  const byMonth={};
  for(let i=0;i<12;i++) byMonth[i]=[];
  events.forEach(ev=>byMonth[ev.month].push(ev));
  Object.values(byMonth).forEach(a=>a.sort((a,b)=>a.day-b.day));

  let hdr='',dots='',cols='';
  for(let i=0;i<12;i++){
    const isCur=i===todayMonth,isPast=i<todayMonth;
    const col=isCur?'var(--blue)':isPast?'var(--text3)':'var(--text2)';
    hdr+='<div style="text-align:center;padding:4px 2px;font-size:11px;font-weight:600;color:'+col+'">'+months[i]+(isCur?'<div style="font-size:9px">▼</div>':'')+'</div>';
    const has=byMonth[i].length>0;
    dots+='<div style="display:flex;align-items:center;justify-content:center;padding:5px 0">'+(has?'<div style="width:10px;height:10px;border-radius:50%;background:'+(isPast?'var(--teal)':isCur?'var(--blue)':'var(--border2)')+';border:2px solid '+(isPast?'var(--teal)':isCur?'var(--blue)':'var(--border2)')+'"></div>':'<div style="width:6px;height:6px;border-radius:50%;background:var(--border)"></div>')+'</div>';
    if(!byMonth[i].length){cols+='<div></div>';continue;}
    let col2='';
    byMonth[i].forEach(ev=>{
      const done=ev.status==='已校驗'||ev.status==='已保養';
      const tc=done?'var(--teal)':isPast?'var(--amber)':'var(--text2)';
      const bg=done?'var(--teal-light)':isPast?'var(--amber-light)':'var(--surface2)';
      const bd=done?'rgba(13,122,95,0.2)':isPast?'rgba(156,93,10,0.2)':'var(--border)';
      col2+='<div style="background:'+bg+';border-radius:var(--radius-sm);padding:5px 6px;border:0.5px solid '+bd+';margin-bottom:4px">'
        +'<div style="font-size:11px;font-weight:600;color:'+tc+';line-height:1.3">'+ev.name+'</div>'
        +'<div style="font-size:10px;color:var(--text3);margin-top:2px">'+(ev.cost>0?'NT$'+ev.cost.toLocaleString():'—')+'</div>'
        +'<div style="font-size:10px;color:'+tc+';margin-top:2px">'+ev.status+'</div>'
        +'</div>';
    });
    cols+='<div style="padding:0 2px">'+col2+'</div>';
  }
  container.innerHTML='<div style="overflow-x:auto"><div style="min-width:900px">'
    +'<div style="display:grid;grid-template-columns:repeat(12,1fr);border-bottom:2px solid var(--blue)">'+hdr+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(12,1fr);border-bottom:1px solid var(--border);margin-bottom:8px">'+dots+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(12,1fr);align-items:start">'+cols+'</div>'
    +'<div style="margin-top:8px;display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:var(--blue)"></div>'+(()=>{const _d=new Date();const m=_d.getMonth()+1;const day=_d.getDate();return'<span style="font-size:11px;color:var(--blue);font-weight:500">今天：'+_d.getFullYear()+'/'+(m<10?'0':'')+m+'/'+(day<10?'0':'')+day+'</span>';})()+''
    +'<div style="margin-left:auto;display:flex;gap:12px">'
    +'<span style="font-size:11px;color:var(--teal);display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--teal-light)"></div>已完成</span>'
    +'<span style="font-size:11px;color:var(--amber);display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--amber-light)"></div>未完成（已過）</span>'
    +'<span style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--surface2)"></div>待執行</span>'
    +'</div></div></div></div>';
}

function filterConsumables(){
  // Get active filters
  const activeQ = document.querySelector('.con-filter.active')?.dataset.fq || '全部';
  const activeP = document.querySelector('.con-filter-p.active')?.dataset.fp || '全部';
  const activeT = document.querySelector('.con-filter-t.active')?.dataset.ft || '全部';
  const activeS = document.querySelector('.con-filter-s.active')?.dataset.fs || '全部';

  // Update active state of clicked button
  const clicked = event?.target;
  if(clicked && clicked.classList.contains('filter-chip')){
    const group = [...clicked.classList].find(c=>c.startsWith('con-filter'));
    document.querySelectorAll('.'+group).forEach(el=>el.classList.remove('active'));
    clicked.classList.add('active');
  }

  // Re-read after update
  const fq = document.querySelector('.con-filter.active')?.dataset.fq || '全部';
  const fp = document.querySelector('.con-filter-p.active')?.dataset.fp || '全部';
  const ft = document.querySelector('.con-filter-t.active')?.dataset.ft || '全部';
  const fs = document.querySelector('.con-filter-s.active')?.dataset.fs || '全部';

  const rows = document.querySelectorAll('.con-row');
  let visible = 0;
  rows.forEach(row=>{
    const q = row.dataset.q;
    const p = row.dataset.p;
    const t = row.dataset.t;
    const ord = row.dataset.ordered;
    const acc = row.dataset.accounted;
    let show = true;
    if(fq!=='全部' && q!==fq) show=false;
    if(fp!=='全部' && p!==fp) show=false;
    if(ft!=='全部' && t!==ft) show=false;
    if(fs==='已下單' && ord!=='true') show=false;
    if(fs==='未下單' && ord!=='false') show=false;
    if(fs==='已報帳' && acc!=='true') show=false;
    if(fs==='未報帳' && acc!=='false') show=false;
    row.style.display = show ? '' : 'none';
    if(show) visible++;
  });
  const countEl = document.getElementById('con-count');
  if(countEl) countEl.textContent = visible + ' 筆';
}

    const d = new Date(dateStr);
    const start = new Date(year+'-01-01');
    return Math.floor((d-start)/86400000)+1;
  }
  function pct(day){ return ((day-1)/totalDays*100).toFixed(3)+'%'; }
  function pctWidth(start,end){
    const s=dayOfYear(start), e=dayOfYear(end);
    return (((e-s+1)/totalDays)*100).toFixed(3)+'%';
  }

  const today = new Date();today.setHours(0,0,0,0);
  const todayStr = today.toISOString().split('T')[0];
  const todayDoy = dayOfYear(todayStr);
  const todayPct = ((todayDoy-1)/totalDays*100).toFixed(3);

  // Auto-pull Chamber maintenance from chamberMaint
  const maintEntries = chamberMaint
    .filter(r=>r.maintScheduled)
    .map(r=>({id:'cm-'+r.id,device:'Chamber',owner:'維修/保養',project:'Chamber 保養 '+r.quarter,start:r.maintScheduled,end:r.maintScheduled,samples:'',condition:'',type:'maint'}));

  // Auto-pull Oven calibration from EQ (Oven = id not in EQ, so use calScheduled from relevant EQ)
  // Oven is a separate device tracked in bookingData; pull cal entries from bookingData type='cal'
  const calEntries = bookingData.filter(b=>b.type==='cal'&&b.device==='Oven');

  // Merge: bookingData (manual bookings) + auto maint + auto cal
  const allBookings = [
    ...bookingData.filter(b=>b.type==='booking'),

    ...calEntries

  const chamberBookings = allBookings.filter(b=>b.device==='Chamber').sort((a,b)=>a.start.localeCompare(b.start));
  const ovenBookings = allBookings.filter(b=>b.device==='Oven').sort((a,b)=>a.start.localeCompare(b.start));

  // Month header positions
  let monthHeaders = '';
  let dayOffset = 0;
  months.forEach((m,i)=>{
    const left = (dayOffset/totalDays*100).toFixed(3);
    const width = (daysInMonth[i]/totalDays*100).toFixed(3);
    monthHeaders += '<div style="position:absolute;left:'+left+'%;width:'+width+'%;text-align:center;font-size:11px;font-weight:600;color:var(--text2);border-right:0.5px solid var(--border)">'+m+'</div>';

        +'onclick="openBookingDetail('+b.id+')" title="'+b.project+' ('+b.start+' ~ '+b.end+')">'
        +'<span style="font-size:10px;font-weight:600;color:'+textC+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(isMaint?'🔧 ':'')+b.project+'</span>'
        +'</div>';
    }).join('');

    return '<div style="display:flex;align-items:stretch;margin-bottom:4px">'
      +'<div style="width:90px;flex-shrink:0;background:'+color+';border-radius:var(--radius-md) 0 0 var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;color:#fff">'
      +'<div style="font-size:11px;font-weight:600;text-align:center">'+label+'</div>'
      +'</div>'
      +'<div style="flex:1;position:relative;background:'+lightColor+';border-radius:0 var(--radius-md) var(--radius-md) 0;height:44px;border:1px solid var(--border);border-left:none">'
      // today line
      +'<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:1.5px;background:var(--red);z-index:3;pointer-events:none"></div>'
      + bars
      +'</div>'
      +'</div>';
  }

  const chamberRow = renderRow(chamberBookings,'Chamber 環境試驗箱','#185FA5','#F0F5FF');
  const ovenRow = renderRow(ovenBookings,'Oven 烤箱','#0D7A5F','#F0FAF5');

  const upcoming = bookingData.filter(b=>b.end>=todayStr&&b.type==='booking').sort((a,b)=>a.start.localeCompare(b.start)).slice(0,5);
  const upcomingMaintGantt = maintEntries.filter(r=>r.end>=todayStr).sort((a,b)=>a.start.localeCompare(b.start)).slice(0,5);
  const chamberBusy = bookingData.filter(b=>b.device==='Chamber'&&b.start<=todayStr&&b.end>=todayStr);
  const ovenBusy = bookingData.filter(b=>b.device==='Oven'&&b.start<=todayStr&&b.end>=todayStr);

  return`<div class="page-hd">
  <div class="page-hd-left"><h1><i class="ti ti-calendar-event"></i>設備預約</h1><p>Chamber 環境試驗箱 · Oven 烤箱 設備借用管理 — 2026 年度</p></div>
  <button class="btn btn-primary" onclick="openBookingAdd('booking')"><i class="ti ti-plus"></i> 新增預約</button>
</div>

      <div style="font-size:15px;font-weight:600;color:${chamberBusy.length?'var(--red)':'var(--teal)'}">${chamberBusy.length?'使用中':'閒置'}</div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:3px">${chamberBusy.length?chamberBusy[0].owner+' · '+chamberBusy[0].project:'可供借用'}</div>
  </div>
  <div class="card" style="padding:1rem">

<div class="card" style="margin-bottom:1.25rem">
  <div class="card-hd"><span class="card-title"><i class="ti ti-clock-check"></i> 最近可預約空檔</span></div>
  ${(()=>{
    const today = new Date();today.setHours(0,0,0,0);
    const todayStr = today.toISOString().split('T')[0];
    const endOfYear = new Date('2026-12-31');

    function findNextSlots(device, maxSlots){
      // Only consider bookings that overlap with today or future
      const booked = allBookings
        .filter(b=>b.device===device && new Date(b.end) >= today)
        .map(b=>({ start: new Date(b.start), end: new Date(b.end) }))
        .sort((a,b)=>a.start-b.start);

      const slots = [];
      let cursor = new Date(today); // start from today

      for(let i=0;i<=booked.length;i++){
        const nextBlock = booked[i] ? booked[i].start : new Date(endOfYear.getTime()+86400000);
        // if this booking already started before today, skip ahead
        if(booked[i] && booked[i].start <= today){
          cursor = new Date(Math.max(cursor.getTime(), booked[i].end.getTime()+86400000));
          continue;
        }
        const gapStart = new Date(cursor);
        const gapEnd = new Date(nextBlock.getTime()-86400000);
        if(gapEnd >= gapStart){
          slots.push({start:gapStart, end:gapEnd});
          if(slots.length >= maxSlots) break;
        }
        if(booked[i]) cursor = new Date(booked[i].end.getTime()+86400000);
      }
      return slots;
    }

    const fmt = d => (d.getMonth()+1)+'/'+ d.getDate();
    const chamberSlots = findNextSlots('Chamber', 3);
    const ovenSlots = findNextSlots('Oven', 3);

    const renderSlots = (slots, color, lightColor) => {
      if(!slots.length) return '<div style="font-size:12px;color:var(--text3)">目前全年無空檔</div>';
      return slots.map((s,i)=>{
        const days = Math.round((s.end-s.start)/86400000)+1;
        const isFirst = i===0;
        return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)">'
          +'<div style="width:7px;height:7px;border-radius:50%;background:'+color+';flex-shrink:0"></div>'
          +'<div style="flex:1">'
          +'<div style="font-size:13px;font-weight:'+(isFirst?'600':'400')+';color:'+(isFirst?color:'var(--text)')+'">'+fmt(s.start)+' ~ '+fmt(s.end)+'</div>'
          +'<div style="font-size:11px;color:var(--text3)">共 '+days+' 天'+(isFirst?' · 最近空檔':'')+'</div>'
          +'</div>'
          +(isFirst?'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:'+lightColor+';color:'+color+'">可預約</span>':'')
          +'</div>';
      }).join('');
    };

    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">'
      +'<div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:#185FA5"></div>'
      +'<span style="font-size:12px;font-weight:600;color:var(--text)">Chamber 環境試驗箱</span>'
      +'</div>'
      +renderSlots(chamberSlots,'#185FA5','var(--blue-light)')
      +'</div>'
      +'<div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:#0D7A5F"></div>'
      +'<span style="font-size:12px;font-weight:600;color:var(--text)">Oven 烤箱</span>'
      +'</div>'
      +renderSlots(ovenSlots,'#0D7A5F','var(--teal-light)')
      +'</div>'
      +'</div>';
  })()}
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">

    ${upcoming.length===0

        +'</div>').join('')
    }

</div>`;

function saveBookingEntry(type, device){
  device = device || 'Chamber';
  const proj = document.getElementById('bproj')?.value.trim();
  const unit = document.getElementById('bunit')?.value.trim()||'';
  const person = document.getElementById('bperson')?.value.trim()||'';
  const owner = type==='maint'?'維修/保養':'蕭志祥';
  const start = document.getElementById('bstart').value;
  const end = document.getElementById('bend').value;
  const samples = document.getElementById('bsamples')?.value.trim()||'';
  const cond = document.getElementById('bcond')?.value.trim()||'';
  if(!proj||!start||!end||!unit||!person){ alert('請填寫所有必要欄位'); return; }
  if(start>end){ alert('結束日期不能早於開始日期'); return; }
  // Check conflict
  const conflict = bookingData.find(b=>b.device===device&&!(b.end<start||b.start>end));
  if(conflict){ alert('此區間與現有預約「'+conflict.project+'」衝突！'); return; }
  bookingData.push({id:Date.now(),device,owner,project:proj,unit,person,start,end,samples,condition:cond,type});
  bookingData.sort((a,b)=>a.start.localeCompare(b.start));
  closeModal(); render(); saveToSheets('預約');
}

function deleteConsumable(id){
  const r = consumables2026.find(x=>x.id===id);
  if(!r) return;
  if(confirm('確定刪除「'+r.item+'」？')){
    const idx = consumables2026.findIndex(x=>x.id===id);
    if(idx>-1) consumables2026.splice(idx,1);
    render();
  }
}

function renderBudgetDonuts(){
  const el = document.getElementById('budget-donuts');
  if(!el) return;

  const calPlan = EQ.filter(e=>e.calMethod!=='不需校驗').reduce((s,e)=>s+(e.calPlan||0),0);
  const calActual = EQ.filter(e=>e.calMethod!=='不需校驗').reduce((s,e)=>s+(e.calCost||0),0);
  const maintBase = EQ.filter(e=>[14,15,16].includes(e.id));
  const maintPlan = maintBase.reduce((s,e)=>s+(e.maintPlanCost||0),0)+chamberMaint.reduce((s,r)=>s+(r.maintPlanCost||0),0);
  const maintActual = maintBase.reduce((s,e)=>s+(e.maintCost||0),0)+chamberMaint.reduce((s,r)=>s+(r.maintCost||0),0);
  const conActual = consumables2026.filter(r=>r.ordered).reduce((s,r)=>s+r.cost,0);
  const conPlan = 120000;
  const totalPlan = calPlan+maintPlan+conPlan;
  const totalActual = calActual+maintActual+conActual;
  const totalPct = Math.min(Math.round(totalActual/totalPlan*100),100);

  function pct(a,p){ return p>0?Math.min(Math.round(a/p*100),100):0; }
  const R=38, C=+(2*Math.PI*R).toFixed(2);

  // Q breakdowns
  const calByQ={Q1:0,Q2:0,Q3:0,Q4:0};
  EQ.filter(e=>e.calMethod!=='不需校驗'&&e.calScheduled).forEach(e=>{
    const m=new Date(e.calScheduled).getMonth();
    const q=m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4';
    calByQ[q]+=(e.calCost||0);
  });
  const maintByQ={Q1:0,Q2:0,Q3:0,Q4:0};
  maintBase.forEach(e=>{ if(!e.maintScheduled) return; const m=new Date(e.maintScheduled).getMonth(); const q=m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4'; maintByQ[q]+=(e.maintCost||0); });
  chamberMaint.forEach(r=>{ if(!r.maintScheduled) return; const m=new Date(r.maintScheduled).getMonth(); const q=m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4'; maintByQ[q]+=(r.maintCost||0); });
  const conByQ={Q1:0,Q2:0,Q3:0,Q4:0};
  consumables2026.filter(r=>r.ordered&&r.reqDate).forEach(r=>{ const m=new Date(r.reqDate).getMonth(); const q=m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4'; conByQ[q]+=r.cost; });

  function donutSVG(p,color){
    const dash=Math.round((p/100)*C);
    return '<svg viewBox="0 0 100 100" style="transform:rotate(-90deg);width:90px;height:90px">'
      +'<circle cx="50" cy="50" r="38" fill="none" stroke="var(--surface2)" stroke-width="11"/>'
      +'<circle cx="50" cy="50" r="38" fill="none" stroke="'+color+'" stroke-width="11" stroke-dasharray="'+C+'" stroke-dashoffset="'+(C-dash)+'" stroke-linecap="round"/>'
      +'</svg>';
  }

  function qPanel(id, qData, color, budget){
    const qBudget = budget/4;
    const qColors = {Q1:'#185FA5',Q2:'#0D7A5F',Q3:'#9C5D0A',Q4:'#5A2DB8'};
    return '<div id="'+id+'" style="display:none;position:absolute;top:105%;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:200;min-width:210px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">每季費用</div>'
      +['Q1','Q2','Q3','Q4'].map(q=>{
        const p2=Math.min(Math.round(qData[q]/qBudget*100),100);
        const over=qData[q]>qBudget;
        return '<div style="margin-bottom:10px">'
          +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'
          +'<span style="font-weight:600;color:'+qColors[q]+'">'+q+'</span>'
          +'<span style="font-weight:500">NT$'+qData[q].toLocaleString()+'</span>'
          +'</div>'
          +(qData[q]>0?'<div style="height:5px;background:var(--surface2);border-radius:3px;overflow:hidden">'
          +'<div style="height:100%;width:'+p2+'%;background:'+color+';border-radius:3px"></div>'
          +'</div>':'')
          +'</div>';
      }).join('')
      +'</div>';
  }

  function donutCard(id, actual, plan, color, label, qId, qData){
    const p = pct(actual,plan);
    const over = actual>plan;
    const c2 = over?'var(--red)':color;
    return '<div class="donut-wrap" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;position:relative" onclick="toggleQPanel(this)">'
      +'<div style="position:relative;width:90px;height:90px" data-panel="'+qId+'">'  
      +donutSVG(p,c2)
      +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">'
      +'<span style="font-size:16px;font-weight:600">'+p+'%</span>'
      +'</div></div>'
      +'<div style="text-align:center">'
      +'<div style="font-size:12px;font-weight:600;margin-bottom:2px">'+label+' <span style="font-size:10px;color:var(--text3)">▾</span></div>'
      +'<div style="font-size:11px;color:var(--text2)">NT$'+actual.toLocaleString()+'</div>'
      +'<div style="font-size:10px;color:var(--text3)">/ NT$'+plan.toLocaleString()+'</div>'
      +(over?'<div style="font-size:10px;color:var(--red)">⚠ 超支</div>':'')
      +'</div>'
      +qPanel(qId, qData, color, plan)
      +'</div>';
  }

  const summaryHTML = '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">'
    +'<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">年度剩餘</div>'
    +'<div style="font-size:22px;font-weight:600;color:'+(totalActual>totalPlan?'var(--red)':'var(--text)')+'">NT$'+(totalPlan-totalActual).toLocaleString()+'</div>'
    +'<div style="font-size:10px;color:var(--text3)">共 NT$'+totalPlan.toLocaleString()+' 規劃</div>'
    +'<div style="margin-top:8px;height:5px;width:120px;background:var(--surface2);border-radius:3px;overflow:hidden">'
    +'<div style="height:100%;width:'+totalPct+'%;background:'+(totalActual>totalPlan?'var(--red)':'var(--blue)')+';border-radius:3px"></div>'
    +'</div>'
    +'<div style="font-size:10px;color:var(--text2)">整體 '+totalPct+'% 已使用</div>'
    +'</div>';

  const divider = '<div style="width:0.5px;height:110px;background:var(--border);flex-shrink:0;margin:0 0.75rem;align-self:center"></div>';

  el.innerHTML = '<div style="display:flex;align-items:center">'
    +donutCard('cal',calActual,calPlan,calActual>calPlan?'var(--red)':'var(--teal)','校驗','cal-q-panel',calByQ)
    +divider
    +donutCard('maint',maintActual,maintPlan,maintActual>maintPlan?'var(--red)':'var(--amber)','保養','maint-q-panel',maintByQ)
    +divider
    +donutCard('con',conActual,conPlan,conActual>conPlan?'var(--red)':'#5A2DB8','耗材','con-q-panel',conByQ)
    +divider
    +summaryHTML
    +'</div>';
}

function toggleQPanel(el){
  const wrap = el.closest ? el.closest('.donut-wrap') : el.parentElement;
  const inner = wrap ? wrap.querySelector('[data-panel]') : null;
  const panelId = inner ? inner.dataset.panel : null;
  if(!panelId) return;
  const panel = document.getElementById(panelId);
  if(!panel) return;
  const isOpen = panel.style.display !== 'none';
  document.querySelectorAll('#cal-q-panel,#maint-q-panel,#con-q-panel').forEach(p=>{ if(p) p.style.display='none'; });
  if(!isOpen) panel.style.display = 'block';
}

/* ── EQUIPMENT FILTERS ── */
const eqF = { q:'', cat:'', brand:'', model:'', owner:'' };

document.addEventListener('click', () => {
  document.querySelectorAll('.chip-dropdown.open').forEach(d => d.classList.remove('open'));
});

function openChipDD(name) {
  const dd = document.getElementById('chip-dd-' + name);
  if (!dd) return;
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.chip-dropdown.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) {
    populateChipOpts(name);
    dd.classList.add('open');
  }
  event.stopPropagation();
}

function populateChipOpts(name) {
  let vals = [];
  if (name === 'cat')   vals = [...new Set(EQ.map(e => e.cat))].sort();
  if (name === 'brand') vals = [...new Set(EQ.map(e => e.brand))].sort();
  if (name === 'model') vals = eqF.brand
    ? [...new Set(EQ.filter(e => e.brand === eqF.brand).map(e => e.model))].sort()
    : [...new Set(EQ.map(e => e.model))].sort();
  if (name === 'owner') vals = [...new Set(EQ.map(e => e.owner))].sort();

  const container = document.getElementById('chip-opts-' + name);
  if (!container) return;

  container.innerHTML = vals.map(v => {
    const isSel = eqF[name] === v;
    let inner = '';
    if (name === 'cat') {
      const cc = v==='電性'?'elec':v==='材料'?'mat':v==='電性/材料'?'elec':'na';
      inner = `<span class="badge badge-${cc}" style="pointer-events:none">${v}</span>`;
    } else if (name === 'model') {
      inner = `<span style="pointer-events:none;font-family:var(--mono);font-size:11px">${v}</span>`;
    } else {
      inner = `<span style="pointer-events:none">${v}</span>`;
    }
    return `<div class="chip-opt ${isSel?'sel':''}" data-val="${v}" onclick="pickChipVal('${name}','${v}',this)">
      <span class="chip-opt-check">${isSel?'✓':''}</span>${inner}
    </div>`;
  }).join('');
}

function pickChipVal(name, val, el) {
  eqF[name] = eqF[name] === val ? '' : val;
  if (name === 'brand') eqF.model = '';

  // update check marks in-place
  const container = document.getElementById('chip-opts-' + name);
  if (container) {
    container.querySelectorAll('.chip-opt').forEach(opt => {
      const sel = opt.dataset.val === eqF[name];
      opt.classList.toggle('sel', sel);
      opt.querySelector('.chip-opt-check').textContent = sel ? '✓' : '';
    });
  }

  // if brand changed, close brand dropdown and reset model chip label
  if (name === 'brand') {
    document.getElementById('chip-dd-brand')?.classList.remove('open');
    updateChipLabel('model', eqF.model || '型號');
  }

  updateChipLabel(name, eqF[name] || { cat:'類別', brand:'廠牌', model:'型號', owner:'負責人' }[name]);
  updateChipActive(name);
  updateActiveCount();
  filterEquipment();
  event.stopPropagation();
}

function updateChipLabel(name, text) {
  const lbl = document.querySelector(`#chip-${name} .chip-label`);
  if (lbl) lbl.textContent = text;
}

function updateChipActive(name) {
  const chip = document.getElementById('chip-' + name);
  if (!chip) return;
  const hasVal = !!eqF[name];
  chip.classList.toggle('active', hasVal);
  const clr = chip.querySelector('.chip-clear');
  if (clr) clr.style.display = hasVal ? 'inline' : 'none';
  // model chip opacity
  if (name === 'brand') {
    const mc = document.getElementById('chip-model');
    if (mc) mc.style.opacity = eqF.brand ? '1' : '0.45';
  }
}

function updateActiveCount() {
  const count = Object.values(eqF).filter(Boolean).length;
  const badge = document.getElementById('ef-active-badge');
  if (badge) { badge.textContent = count || ''; badge.style.display = count ? 'inline-flex' : 'none'; }
}

function clearChip(name) {
  eqF[name] = '';
  if (name === 'brand') { eqF.model = ''; updateChipLabel('model','型號'); updateChipActive('model'); }
  const defaults = { cat:'類別', brand:'廠牌', model:'型號', owner:'負責人' };
  updateChipLabel(name, defaults[name]);
  updateChipActive(name);
  updateActiveCount();
  filterEquipment();
  event.stopPropagation();
}

function resetEqFilters() {
  Object.keys(eqF).forEach(k => eqF[k] = '');
  const qi = document.getElementById('ef-q');
  if (qi) qi.value = '';
  ['cat','brand','model','owner'].forEach(name => {
    const defaults = { cat:'類別', brand:'廠牌', model:'型號', owner:'負責人' };
    updateChipLabel(name, defaults[name]);
    updateChipActive(name);
  });
  const mc = document.getElementById('chip-model');
  if (mc) mc.style.opacity = '0.45';
  updateActiveCount();
  filterEquipment();
}

function filterEquipment() {
  eqF.q = (document.getElementById('ef-q')?.value || '').toLowerCase();
  const data = EQ.filter(e => {
    if (eqF.q && !(e.name+e.brand+e.model+e.prop+e.owner).toLowerCase().includes(eqF.q)) return false;
    if (eqF.cat   && e.cat   !== eqF.cat)   return false;
    if (eqF.brand && e.brand !== eqF.brand) return false;
    if (eqF.model && e.model !== eqF.model) return false;
    if (eqF.owner && e.owner !== eqF.owner) return false;
    return true;
  });

  const counter = document.getElementById('eq-counter');
  if (counter) counter.textContent = `${data.length} / ${EQ.length} 台設備`;

  const tbody = document.getElementById('eq-tbody');
  if (!tbody) return;
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2.5rem;color:var(--text3);font-size:13px"><i class="ti ti-search-off" style="font-size:28px;display:block;margin-bottom:8px"></i>無符合條件的設備</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(e => {
    const cc = e.cat==='電性'?'elec':e.cat==='材料'?'mat':e.cat==='電性/材料'?'elec':'na';
    return `<tr>
      <td class="td-mono" style="color:var(--text3)">${e.id}</td>
      <td><span class="badge badge-${cc}">${e.cat}</span></td>
      <td class="td-mono">${e.prop}</td>
      <td>
        <div style="font-weight:500;font-size:13px;line-height:1.4;margin-bottom:3px">${e.name}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${e.brand} · ${e.model}</div>
      </td>
      <td><span class="owner-pill">${e.owner}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-ghost" onclick="openDetail(${e.id})" title="詳情"><i class="ti ti-eye"></i></button>
        <button class="btn btn-sm btn-ghost" onclick="openEdit(${e.id})" title="編輯"><i class="ti ti-edit"></i></button>
        <button class="btn btn-sm btn-ghost btn-danger" onclick="deleteEquip(${e.id})" title="刪除"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
}

/* ── BUDGET ── */
function renderBudget(){
  // 從校驗資料抓
  const calData = EQ.filter(e=>e.calMethod!=='不需校驗');
  const calPlanTotal = calData.reduce((s,e)=>s+(e.calPlan||0),0);
  const calActualTotal = calData.reduce((s,e)=>s+(e.calCost||0),0);

  // 從保養資料抓（3台 + Chamber四季）
  const maintBase = EQ.filter(e=>[14,15,16].includes(e.id));
  const maintPlanBase = maintBase.reduce((s,e)=>s+(e.maintPlanCost||0),0);
  const maintActualBase = maintBase.reduce((s,e)=>s+(e.maintCost||0),0);
  const chamberPlanTotal = chamberMaint.reduce((s,r)=>s+(r.maintPlanCost||0),0);
  const chamberActualTotal = chamberMaint.reduce((s,r)=>s+(r.maintCost||0),0);
  const maintPlanTotal = maintPlanBase + chamberPlanTotal;
  const maintActualTotal = maintActualBase + chamberActualTotal;

  // 每季校驗
  const calByQ = {Q1:0,Q2:0,Q3:0,Q4:0};
  calData.forEach(e=>{
    if(!e.calScheduled) return;
    const m = new Date(e.calScheduled).getMonth();
    const q = m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4';
    calByQ[q] += (e.calPlan||0);
  });

  // 每季保養
  const maintByQ = {Q1:0,Q2:0,Q3:0,Q4:0};
  maintBase.forEach(e=>{
    if(!e.maintScheduled) return;
    const m = new Date(e.maintScheduled).getMonth();
    const q = m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4';
    maintByQ[q] += (e.maintPlanCost||0);
  });
  chamberMaint.forEach(r=>{
    if(!r.maintScheduled) return;
    const m = new Date(r.maintScheduled).getMonth();
    const q = m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4';
    maintByQ[q] += (r.maintPlanCost||0);
  });

  const calPct = calPlanTotal>0?Math.min(Math.round(calActualTotal/calPlanTotal*100),100):0;
  const maintPct = maintPlanTotal>0?Math.min(Math.round(maintActualTotal/maintPlanTotal*100),100):0;

  return`<div class="page-hd"><div class="page-hd-left"><h1><i class="ti ti-report-money"></i>預算管理</h1><p>2026 年度校驗與保養費用規劃</p></div></div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">
  <div class="card">
    <div class="card-hd"><span class="card-title"><i class="ti ti-certificate"></i> 2026 校驗預算</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
      <span style="color:var(--text2)">規劃費用</span><span style="font-weight:500">NT$${calPlanTotal.toLocaleString()}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">
      <span style="color:var(--text2)">實際花費</span><span style="font-weight:500;color:var(--teal)">NT$${calActualTotal.toLocaleString()}</span>
    </div>
    <div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:4px">
      <div style="height:100%;width:${calPct}%;background:${calActualTotal>calPlanTotal?'var(--red)':'var(--teal)'};border-radius:4px;transition:width 0.5s"></div>
    </div>
    <div style="font-size:11px;color:var(--text3)">${calPct}% 已使用 ${calActualTotal>calPlanTotal?'<span style="color:var(--red);font-weight:500">⚠ 超支</span>':''}</div>
  </div>
  <div class="card">
    <div class="card-hd"><span class="card-title"><i class="ti ti-settings-2"></i> 2026 保養預算</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
      <span style="color:var(--text2)">規劃費用</span><span style="font-weight:500">NT$${maintPlanTotal.toLocaleString()}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">
      <span style="color:var(--text2)">實際花費</span><span style="font-weight:500;color:var(--amber)">NT$${maintActualTotal.toLocaleString()}</span>
    </div>
    <div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:4px">
      <div style="height:100%;width:${maintPct}%;background:${maintActualTotal>maintPlanTotal?'var(--red)':'var(--amber)'};border-radius:4px;transition:width 0.5s"></div>
    </div>
    <div style="font-size:11px;color:var(--text3)">${maintPct}% 已使用 ${maintActualTotal>maintPlanTotal?'<span style="color:var(--red);font-weight:500">⚠ 超支</span>':''}</div>
  </div>
</div>

<div class="card section-gap">
  <div class="card-hd"><span class="card-title"><i class="ti ti-chart-bar"></i> 2026 年度校驗規劃（每季）</span><strong style="font-size:13px">NT$${calPlanTotal.toLocaleString()}</strong></div>
  <div class="q-grid">${['Q1','Q2','Q3','Q4'].map(q=>`<div class="q-box"><div class="q-label">${q}</div><div class="q-val ${calByQ[q]>0?'blue':''}">${calByQ[q]>0?'NT$'+calByQ[q].toLocaleString():'—'}</div></div>`).join('')}</div>
  ${calData.filter(e=>e.calPlan>0).sort((a,b)=>(a.calScheduled||'').localeCompare(b.calScheduled||'')).map(e=>{
    const m=e.calScheduled?new Date(e.calScheduled).getMonth():null;
    const q=m!==null?(m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4'):'—';
    return`<div class="budget-row">
      <span>${e.name}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge badge-na">${q}</span>
        <span style="color:var(--text2)">規劃 NT$${(e.calPlan||0).toLocaleString()}</span>
        ${e.calCost?`<span style="color:var(--teal);font-weight:500">實際 NT$${e.calCost.toLocaleString()}</span>`:''}

  <div class="card-hd"><span class="card-title"><i class="ti ti-chart-bar"></i> 2026 年度保養規劃（每季）</span><strong style="font-size:13px">NT$${maintPlanTotal.toLocaleString()}</strong></div>
  <div class="q-grid">${['Q1','Q2','Q3','Q4'].map(q=>`<div class="q-box"><div class="q-label">${q}</div><div class="q-val amber">${maintByQ[q]>0?'NT$'+maintByQ[q].toLocaleString():'—'}</div></div>`).join('')}</div>
  ${[...chamberMaint.map(r=>({name:'Chamber 環境試驗箱 '+r.quarter,scheduled:r.maintScheduled,plan:r.maintPlanCost,actual:r.maintCost})),...maintBase.map(e=>({name:e.name,scheduled:e.maintScheduled,plan:e.maintPlanCost,actual:e.maintCost}))].sort((a,b)=>(a.scheduled||'').localeCompare(b.scheduled||'')).map(item=>{
    const m=item.scheduled?new Date(item.scheduled).getMonth():null;
    const q=m!==null?(m<3?'Q1':m<6?'Q2':m<9?'Q3':'Q4'):'—';
    return`<div class="budget-row">

  }).join('')}
  <div class="budget-row budget-total"><span>合計</span><span>NT$${maintPlanTotal.toLocaleString()}</span></div>
</div>`;
}

function doAddEq(){
  const name = document.getElementById('fn').value.trim();
  if(!name){ document.getElementById('fn').style.borderColor='var(--red)'; return; }
  const newId = EQ.length > 0 ? Math.max(...EQ.map(e=>e.id))+1 : 1;
  const calMethod = document.getElementById('fcm').value;
  const hasMaint = document.getElementById('fms2')?.value || parseInt(document.getElementById('fmplan')?.value||0)>0;

  EQ.push({
    id: newId,
    name,
    prop:  document.getElementById('fp').value,
    cat:   document.getElementById('fc').value,
    brand: document.getElementById('fbr').value,
    model: document.getElementById('fmo').value,
    sn:    document.getElementById('fsn').value,
    owner: document.getElementById('fo').value,
    calMethod,
    calScheduled: document.getElementById('fcs').value,
    calPlan:   parseInt(document.getElementById('fcplan').value)||0,
    calCost:   0,
    calStatus: document.getElementById('fcst').value,
    maintScheduled: document.getElementById('fms2').value,
    maintPlanCost:  parseInt(document.getElementById('fmplan').value)||0,
    maintCost:   0,
    maintStatus: document.getElementById('fmst2').value,
    vendor:  document.getElementById('fv').value,
    contact: document.getElementById('fct').value,
    lastCal:'', calExpiry:'', lastMaint:'', maintPlan:'',
  });

  // Auto-add to maintIds if has maint data
  if(hasMaint && !maintIds.includes(newId)){
    maintIds.push(newId);
  }

  closeModal(); render(); showToast();
}

  setTimeout(()=>t.classList.remove('show'),2600);
}
